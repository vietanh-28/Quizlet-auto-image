<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="header">
        <div class="logo">
            <svg viewBox="0 0 24 24" width="20" height="20" stroke="#007bff" stroke-width="2" fill="none"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
            <span class="title">Quizlet Extension</span>
        </div>
        <span class="version">v1.0</span>
    </div>

    <div class="content">
        <!-- Nút màu xanh: Chạy tool -->
        <button id="btn-run" class="btn blue-btn">
            <div class="icon-box">
                <svg viewBox="0 0 24 24" width="22" height="22" stroke="currentColor" stroke-width="2" fill="none"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            </div>
            <div class="text-box">
                <strong>Tự động điền ảnh</strong>
                <span>Dùng như cái tên</span>
            </div>
        </button>

        <!-- Nút màu hồng/đỏ: Tải lại trang (Reset) -->
        <button id="btn-reset" class="btn pink-btn">
            <div class="icon-box">
                <svg viewBox="0 0 24 24" width="22" height="22" stroke="currentColor" stroke-width="2" fill="none"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
            </div>
            <div class="text-box">
                <strong>Reset lại trang</strong>
                <span>Khắc phục khi lỗi UI</span>
            </div>
        </button>

        <!-- Trạng thái -->
        <div class="status-box">
            <span class="dot"></span> <span id="status-text">Sẵn sàng hoạt động</span>
        </div>
    </div>

    <div class="footer">
        Made with <span class="heart">❤</span> by Việt Anh
    </div>

    <!-- Script xử lý sự kiện -->
    <script src="popup.js"></script>
</body>
</html>
